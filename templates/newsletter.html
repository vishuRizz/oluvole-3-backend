<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jara Beach Resort Newsletter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .content {
            font-size: 16px;
            line-height: 1.8;
            color: #555;
            white-space: pre-wrap;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 14px;
            color: #777;
        }

        .social-links {
            margin-top: 15px;
        }

        .social-links a {
            display: inline-block;
            margin: 0 10px;
            color: #667eea;
            text-decoration: none;
        }

        .unsubscribe {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="{{baseUrl}}/uploads/banner-email.jpeg" alt="Jara Beach Resort" style="width: 100%; height: auto; display: block; border-radius: 12px 12px 0 0; margin: -30px -30px 20px -30px; max-width: calc(100% + 60px);" />
        <div class="header">
            <h2>🌴 Jara Beach Resort</h2>
        </div>

        <p>Dear {{name}},</p>

        <div class="content">
            {{content}}
        </div>

        <p class="footer">
            Best regards,<br />
            <strong>The Jara Beach Resort Team</strong>
        <div class="social-links">
            <a href="https://instagram.com/jarabeachresort">Instagram</a> |
            <a href="https://facebook.com/jarabeachresort">Facebook</a> |
            <a href="https://www.jarabeachresort.com">Website</a>
        </div>
        <p class="unsubscribe">
            You received this email because you've stayed with us or signed up for updates.
        </p>
        </p>
    </div>
</body>

</html>
